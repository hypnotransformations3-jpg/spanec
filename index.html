<!DOCTYPE html>
<html lang="sl-SI">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnevnik Spanja</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f7; color: #333; }
        .box { background: white; padding: 20px; border-radius: 10px; border: 1px solid #ccc; max-width: 600px; margin: auto; }
        h2 { color: #2d6e6e; border-bottom: 2px solid #2d6e6e; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #2d6e6e; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .tabs { display: flex; margin-bottom: 20px; justify-content: center; }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; }
        .tab.active { border-bottom: 3px solid #2d6e6e; color: #2d6e6e; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2d6e6e; color: white; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="t1" class="tab active" onclick="prikazi('vnos')">VNOS PODATKOV</div>
    <div id="t2" class="tab" onclick="prikazi('pregled')">DNEVI NAPREDKA</div>
</div>

<div id="vnos" class="box">
    <h2>Vnos za: <span id="izpisIme">...</span></h2>
    
    <input type="hidden" id="uName">
    <input type="hidden" id="uEmail">

    <div class="field">
        <label>Kdaj ste sli zvecer v posteljo?</label>
        <input type="time" id="f1">
    </div>
    <div class="field">
        <label>Kdaj ste zjutraj vstali?</label>
        <input type="time" id="f2">
    </div>
    <div class="field">
        <label>Cas zaspatja (min)</label>
        <input type="number" id="f3">
    </div>
    <div class="field">
        <label>Elektronika (min)</label>
        <input type="number" id="f4">
    </div>
    <div class="field">
        <label>Kava (ur)</label>
        <input type="number" id="f5">
    </div>
    <div class="field">
        <label>Alkohol</label>
        <input type="text" id="f6">
    </div>
    <div class="field">
        <label>Hrana</label>
        <input type="text" id="f7">
    </div>
    <div class="field">
        <label>Vprasanja za jutri (Da/Ne)</label>
        <select id="f8"><option value="Ne">Ne</option><option value="Da">Da</option></select>
    </div>
    <div class="field">
        <label>Prebujanja ponoci (število)</label>
        <input type="number" id="f9" value="0">
    </div>
    <div class="field">
        <label>Zaspati nazaj (Da/Ne)</label>
        <select id="f10"><option value="Da">Da</option><option value="Ne">Ne</option></select>
    </div>
    <div class="field">
        <label>Jutranje pocutje (1-5)</label>
        <input type="number" id="f11" min="1" max="5">
    </div>
    <div class="field">
        <label>Kaj vas je razveselilo</label>
        <textarea id="f12"></textarea>
    </div>
    <div class="field">
        <label>Namera za nocoj</label>
        <textarea id="f13"></textarea>
    </div>

    <button class="btn" onclick="posljiMail()">ODPRI EMAIL IN SHRANITE</button>
</div>

<div id="pregled" class="box hidden" style="max-width: 900px;">
    <h2>Zgodovina napredka</h2>
    <div id="tabelaPodatkov">Nalagam podatke...</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwqI4CAqpL1GDWy0wkMv2Px5xkE6IcJTR0IyeK7waCgr-BOiFwxC3MCsU_nBZ95O4yU/exec';
const MOJ_MAIL = 'info@hypno-transformations.com';

// 1. FUNKCIJA: Prebere ime iz URL in ga nastavi
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const ime = urlParams.get('ime') || "";
    const email = urlParams.get('email') || "";
    
    if(ime) {
        document.getElementById('uName').value = ime;
        document.getElementById('izpisIme').innerText = ime;
    }
    if(email) {
        document.getElementById('uEmail').value = email;
    }
};

function prikazi(id) {
    document.getElementById('vnos').classList.toggle('hidden', id !== 'vnos');
    document.getElementById('pregled').classList.toggle('hidden', id !== 'pregled');
    document.getElementById('t1').classList.toggle('active', id === 'vnos');
    document.getElementById('t2').classList.toggle('active', id === 'pregled');
    if(id === 'pregled') naloziZgodovino();
}

function posljiMail() {
    const ime = document.getElementById('uName').value;
    const email = document.getElementById('uEmail').value;
    
    const body = `DNEVNIK SPANJA\n\n` +
        `Kdaj ste sli zvecer v posteljo?: ${document.getElementById('f1').value}\n` +
        `Kdaj ste zjutraj vstali?: ${document.getElementById('f2').value}\n` +
        `Cas zaspatja (min): ${document.getElementById('f3').value}\n` +
        `Elektronika (min): ${document.getElementById('f4').value}\n` +
        `Kava (ur): ${document.getElementById('f5').value}\n` +
        `Alkohol: ${document.getElementById('f6').value}\n` +
        `Hrana: ${document.getElementById('f7').value}\n` +
        `Vprasanja za jutri: ${document.getElementById('f8').value}\n` +
        `Prebujanja ponoci: ${document.getElementById('f9').value}\n` +
        `Zaspati nazaj: ${document.getElementById('f10').value}\n` +
        `Jutranje pocutje (1-5): ${document.getElementById('f11').value}\n` +
        `Kaj vas je razveselilo: ${document.getElementById('f12').value}\n` +
        `Namera za nocoj: ${document.getElementById('f13').value}`;

    window.location.href = `mailto:${MOJ_MAIL}?cc=${email}&subject=Dnevnik: ${ime}&body=${encodeURIComponent(body)}`;
}

async function naloziZgodovino() {
    const ime = document.getElementById('uName').value;
    if(!ime) { document.getElementById('tabelaPodatkov').innerText = "Manjka ime."; return; }
    
    try {
        const res = await fetch(API_URL + "?ime=" + encodeURIComponent(ime));
        const json = await res.json();
        
        let html = "<table><tr><th>Dan</th><th>Datum</th><th>Postelja</th><th>Vstajanje</th><th>Zaspatja</th><th>Pocutje</th></tr>";
        json.days.forEach(d => {
            html += `<tr>
                <td>${d['Dan'] || ''}</td>
                <td>${d['Datum'] || ''}</td>
                <td>${d['Kdaj ste sli zvecer v posteljo?'] || ''}</td>
                <td>${d['Kdaj ste zjutraj vstali?'] || ''}</td>
                <td>${d['Cas zaspatja (min)'] || ''}</td>
                <td>${d['Jutranje pocutje (1-5)'] || ''}</td>
            </tr>`;
        });
        html += "</table>";
        document.getElementById('tabelaPodatkov').innerHTML = html;
    } catch(e) {
        document.getElementById('tabelaPodatkov').innerText = "Napaka pri nalaganju.";
    }
}
</script>
</body>
</html>
