<!DOCTYPE html>
<html lang="sl-SI">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moj napredek spanja — Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #2d6e6e; --bg: #f4f7f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section img { max-width: 108px; height: auto; display: block; margin: 0 auto 10px; }
        .logo-text { color: var(--teal); font-size: 24px; font-weight: bold; margin: 0; }
        .tabs { display: flex; margin-bottom: 20px; background: #eee; border-radius: 10px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #666; border-radius: 8px; transition: 0.3s; }
        .tab.active { color: white; background: var(--teal); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .user-info { display: flex; gap: 8px; margin-bottom: 15px; }
        .user-info input { background: #f0f0f0; border: 1px solid #ddd; padding: 10px; border-radius: 8px; flex: 1; font-size: 14px; }
        #dayNav { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
        #dayNav button { padding: 12px 2px; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; }
        #dayNav button.active { background: var(--teal); color: white; }
        .section-h { background: var(--teal); color: white; padding: 10px; margin-top: 20px; font-weight: bold; border-radius: 6px; font-size: 0.85em; text-transform: uppercase; }
        .row { display: flex; flex-direction: column; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .label { font-size: 0.95em; margin-bottom: 8px; font-weight: 500; color: #333; line-height: 1.3; }
        input, select { padding: 14px; border: 1px solid #ccc; border-radius: 10px; width: 100%; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; background: var(--teal); color: white; border: none; border-radius: 10px; margin-top: 25px; cursor: pointer; font-weight: bold; font-size: 17px; }
        .chart-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 10px; margin-top: 10px; height: 380px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <img src="https://raw.githubusercontent.com/hypnotransformations3-jpg/spanec/main/Hypno_transformations_logo_1_crop.png" alt="Logo">
        <div class="logo-text">Moj napredek spanja</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="openTab('vnos')">VNOS</div>
        <div class="tab" onclick="openTab('analiza')">PREGLED</div>
    </div>

    <div class="user-info">
        <input type="text" id="uName" readonly placeholder="Ime">
        <input type="email" id="uEmail" readonly placeholder="E-pošta">
    </div>

    <div id="vnos" class="tab-content active">
        <div id="dayNav"></div>
        <input type="hidden" id="selDay" value="1">

        <div class="section-h">🌜 Večer</div>
        <div class="row"><div class="label">Kdaj ste šli zvečer v posteljo?</div><input type="time" id="bedtime"></div>
        <div class="row"><div class="label">Čas, da ste zaspali (v minutah)</div><input type="number" id="fallasleep"></div>
        <div class="row"><div class="label">Ugasnjena elektronika (min pred spanjem)</div><input type="number" id="electronics"></div>
        <div class="row"><div class="label">Zadnja kava (ure pred spanjem)</div><input type="number" id="coffee"></div>
        <div class="row"><div class="label">Zadnji alkohol (ure pred spanjem)</div><input type="number" id="alcohol"></div>
        <div class="row"><div class="label">Zadnji obrok
