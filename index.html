<!DOCTYPE html>
<html lang="sl-SI">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj Dnevnik Spanja in Počitka</title>
    <style>
        :root { --t: #2d6e6e; --g: #e8cfa0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f4; color: #333; }
        .header { background: #2d6e6e; color: white; text-align: center; padding: 30px 10px; }
        .header img { height: 100px; margin-bottom: 10px; border-radius: 10px; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { border-bottom: 4px solid var(--t); color: var(--t); background: #f9f9f9; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .user-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .user-bar div { flex: 1; min-width: 250px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: var(--t); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* Drsniki za dneve */
        .day-picker { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; margin-bottom: 20px; }
        .day-btn { min-width: 40px; height: 40px; border: 2px solid var(--t); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: var(--t); }
        .day-btn.active { background: var(--t); color: white; }

        .section-h { background: var(--t); color: white; padding: 10px 15px; border-radius: 5px; margin: 25px 0 15px 0; font-size: 1.1em; }
        .q-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .q-row label { flex: 1; margin: 0; }
        .q-row input, .q-row select { width: 120px; }

        .main-btn { background: var(--t); color: white; padding: 20px; border: none; width: 100%; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 10px rgba(45, 110, 110, 0.3); }
        
        /* Tabela napredka */
        .scroll-x { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 14px; }
        th { background: #f4f7f7; color: var(--t); padding: 12px; text-align: left; border-bottom: 2px solid var(--t); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9fdfd; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/hypnotransformations3-jpg/spanec/main/Logo_novi.jpg" alt="Logo">
    <h1>Moj Dnevnik Spanja in Počitka</h1>
</div>

<div class="nav-tabs">
    <div id="tab1" class="tab active" onclick="showSection('vnos')">VNOS PODATKOV</div>
    <div id="tab2" class="tab" onclick="showSection('pregled')">DNEVI NAPREDKA</div>
</div>

<div class="container">
    <div class="user-bar">
        <div><label>Uporabniško ime:</label><input type="text" id="uName" readonly style="background:#eee"></div>
        <div><label>Vaš Email:</label><input type="email" id="uEmail"></div>
    </div>

    <div id="s-vnos">
        <label>Izberite dan programa:</label>
        <div class="day-picker" id="dayPicker"></div>
        <input type="hidden" id="curDay" value="1">

        <div class="section-h">📝 Podatki o spanju</div>
        <div class="q-row"><label>Kdaj ste šli v posteljo?</label><input type="time" id="f1"></div>
        <div class="q-row"><label>Kdaj ste zjutraj vstali?</label><input type="time" id="f2"></div>
        <div class="q-row"><label>Čas zaspatja (min)</label><input type="number" id="f3" placeholder="min"></div>
        <div class="q-row"><label>Elektronika (min)</label><input type="number" id="f4" placeholder="min"></div>
        <div class="q-row"><label>Kava (ur pred spanjem)</label><input type="number" id="f5"></div>
        <div class="q-row"><label>Vprašanja za jutri?</label><select id="f8"><option value="Ne">Ne</option><option value="Da">Da</option></select></div>
        <div class="q-row"><label>Prebujanja ponoči</label><input type="number" id="f9" value="0"></div>
        <div class="q-row"><label>Jutranje počutje (1-5)</label><input type="number" id="f11" min="1" max="5"></div>

        <div class="section-h">💡 Opombe in namera</div>
        <label>Kaj vas je danes razveselilo?</label>
        <textarea id="f12" rows="3"></textarea>
        <label style="margin-top:10px">Namera za nocojšno spanje:</label>
        <textarea id="f13" rows="3"></textarea>

        <button class="main-btn" onclick="submitData()">POŠLJI EMAIL IN SHRANITE</button>
